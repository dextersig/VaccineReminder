<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/dark.css" id="dark"/>
  <link rel="stylesheet" href="css/light.css" id="light"/>

  <!-- Sour Gummy font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy&display=swap" rel="stylesheet">

  <title>Vaccine Reminder</title>
</head>

<body>

<header>
  <h1>Vaccine Reminder</h1>
  <button type="button" onclick="toggleStylesheet(light)">Toggle Theme</button>
</header>

<main>

<form id="userData">

<!-- BASIC INFO -->

<label for="firstName">First Name:</label>
<input type="text" id="firstName"><br>

<label for="lastName">Last Name:</label>
<input type="text" id="lastName"><br>

<label for="birthDay">Birthday:</label>
<input type="date" id="birthDay"><br>

<label for="email">Email:</label>
<input type="email" id="email"><br>

<!-- RISK FACTORS -->

<h3>Risk Factors</h3>

<input type="checkbox" id="chronicSalicylate" name="medical" value="Chronic salicylate therapy">
<label for="chronicSalicylate">Chronic salicylate therapy</label><br>

<input type="checkbox" id="hiv" name="medical" value="HIV">
<label for="hiv">HIV</label><br>

<input type="checkbox" id="asplenia" name="medical" value="Asplenia">
<label for="asplenia">Asplenia</label><br>

<input type="checkbox" id="dialysis" name="chronic" value="Dialysis/Renal Disease">
<label for="dialysis">Dialysis/Renal Disease</label><br>

<input type="checkbox" id="cysticFibrosis" name="chronic" value="Cystic fibrosis">
<label for="cysticFibrosis">Cystic fibrosis</label><br>

<input type="checkbox" id="organTransplant" name="chronic" value="Organ transplant">
<label for="organTransplant">Organ transplant</label><br>

<input type="checkbox" id="cancer" name="chronic" value="Cancer">
<label for="cancer">Cancer</label><br>

<input type="checkbox" id="stemCell" name="chronic" value="Hematopoietic stem cell transplant">
<label for="stemCell">Hematopoietic stem cell transplant</label><br>

<input type="checkbox" id="cartTherapy" name="chronic" value="CAR T-cell therapy recipients">
<label for="cartTherapy">CAR T-cell therapy recipients</label><br>

<input type="checkbox" id="hematologist" name="chronic" value="Under the care of a haematologist or oncologist">
<label for="hematologist">Under the care of a haematologist or oncologist</label><br>

<input type="checkbox" id="hyposplenic" name="chronic" value="Hyposplenic">
<label for="hyposplenic">Hyposplenic</label><br>

<input type="checkbox" id="malignant" name="chronic" value="Malignant neoplasms">
<label for="malignant">Malignant neoplasms</label><br>

<input type="checkbox" id="incompleteIPV" name="chronic" value="Incompletely Immunized - OPV and less than 2 IPV Doses">
<label for="incompleteIPV">Incomplete IPV</label><br>


        <p><b>Select Those That Apply to You</b></p>
        <input type="checkbox" id="Student" name="chronic" value = "Student">
        <label for="Student">Student</label><br>
        <input type="checkbox" id="Retired" name="chronic" value = "Retired">
        <label for="Retired">Retired</label><br>
        <input type="checkbox" id="Healthcare Worker" name="chronic" value = "Healthcare Worker">
        <label for="Healthcare Worker">Healthcare Worker</label><br>
        <input type="checkbox" id="General Worker" name="chronic" value = "General Worker">
        <label for="General Worker">General Worker</label><br>


<!-- VACCINES -->

<h3>Vaccines</h3>

<input type="checkbox" id="MMRVDose1" name="MMRV Dose 1">
<label for="MMRVDose1">MMRV Dose 1</label>
<input type="date" id="dayMMRVDose1"><br>

<input type="checkbox" id="MMRVDose2" name="MMRV Dose 2">
<label for="MMRVDose2">MMRV Dose 2</label>
<input type="date" id="dayMMRVDose2"><br>

<input type="checkbox" id="MMRDose1" name="MMR Dose 1">
<label for="MMRDose1">MMR Dose 1</label>
<input type="date" id="dayMMRDose1"><br>

<input type="checkbox" id="MMRDose2" name="MMR Dose 2">
<label for="MMRDose2">MMR Dose 2</label>
<input type="date" id="dayMMRDose2"><br>

<input type="checkbox" id="IPVDose1" name="IPV Dose 1">
<label for="IPVDose1">IPV Dose 1</label>
<input type="date" id="dayIPVDose1"><br>

<input type="checkbox" id="IPVDose2" name="IPV Dose 2">
<label for="IPVDose2">IPV Dose 2</label>
<input type="date" id="dayIPVDose2"><br>

<input type="checkbox" id="VaricellaDose1" name="Varicella Dose 1" value ="Varicella Dose 1"> 
<label for="VaricellaDose1">Varicella Dose 1</label>
<input type="date" id="dayVaricellaDose1"><br>

<input type="checkbox" id="VaricellaDose2" name="Varicella Dose 2" value ="Varicella Dose 2"> 
<label for="VaricellaDose2">Varicella Dose 2</label>
<input type="date" id="dayVaricellaDose2"><br><br>

<button type="button" id="submitBtn">Submit</button>

</form>

<div id="app"></div>

<script src="js/themeSwitcher.js"></script>
<script type="module" src="/src/main.js"></script>

</main>
</body>
</html>
