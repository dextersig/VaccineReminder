    <script>
      const form = document.getElementById('userData');
      form.addEventListener('submit', (event) => {
        event.preventDefault(); // Prevent the default form submission behavior

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        data.medical = formData.getAll('medical'); // Get all selected medical conditions
        data.chronic = formData.getAll('chronic'); // Get all selected chronic conditions
        data.vaccine = formData.getAll('vaccine'); // Get all selected vaccines
        const data_string = JSON.stringify(data, null, 2); // To make it retty and readable

        // Test Download
        const file = new Blob([data_string], { type: 'application/json' });
        const url = URL.createObjectURL(file);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'form_data.json';
        link.click();
        URL.revokeObjectURL(url); 

        console.log(data); // Log the form data to the console
        alert('Form submitted'); // Test if form submission is working

       
      });
    </script>
