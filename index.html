<!doctype html>
<html lang="en">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaccine Reminder</title>
    <link rel="stylesheet" href="styles.css" />

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>

  <body>
    <header>
      <!-- title and stuff-->
      <h1>Vaccine Reminder</h1>
    </header>
    <!-- date of birth, medical conditions and chronic conditions, email notifs-->



    <form id = "userData" action="/submit_page" >
      <!-- Name -->
      <label for="firstName">First Name:</label>
      <input type = "text" id="firstName" name = "firstName"><br>
      <label for="lastName">Last Name:</label>
      <input type = "text" id="lastName" name = "lastName"><br><br>

		<!-- Date of Birth -->
		<input type = "date" id = "birth day" name = "birth day" value = "1967-04-13" min = "1900-01-01" max = "2100-01-01">

		<!-- Medical Conditions -->
		<p>Medical Conditions</p>
		<input type="checkbox" id="condition1" name="condition1">
		<label for="condition1">Condition 1</label><br>
		<input type="checkbox" id="condition2" name="condition2">
		<label for="condition2">Condition2</label><br>
		<input type="checkbox" id="condition3" name="condition3">
		<label for="condition3">Condition3</label><br>

		<!-- Chronic Conditions -->
		<p>Chronic Conditions</p>
		<input type="checkbox" id="condition4" name="condition1">
		<label for="condition1">Condition 1</label><br>
		<input type="checkbox" id="condition5" name="condition2">
		<label for="condition2">Condition2</label><br>
		<input type="checkbox" id="condition6" name="condition3">
		<label for="condition3">Condition3</label><br><br>

		<!-- email -->
		<label for="email">Email:</label>
		<input type = "email" id="email" name = "email"><br>

		<!-- submit -->
		<br>
		<button type = "button" onclick = "getUserData()">Submit</button>

		</form>


    <script>
      function getUserData(){
        const form = [];
        form.push(document.getElementById('firstName').value);
        form.push(document.getElementById('lastName').value);
        form.push(document.getElementById('birth day').value);
        form.push(document.getElementById('condition1').checked);
        form.push(document.getElementById('condition2').checked);
        form.push(document.getElementById('condition3').checked);
        form.push(document.getElementById('condition4').checked);
        form.push(document.getElementById('condition5').checked);
        form.push(document.getElementById('condition6').checked);
        form.push(document.getElementById('condition1').checked);
        form.push(document.getElementById('condition2').checked);
        form.push(document.getElementById('email').value);
        console.log(form);
      }
    </script>



		<!-- body and stuff-->
	</main>
	
	<footer>
	<!-- footer and stuff-->
    </footer>
  </body>
</html>
