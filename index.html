<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="css/styles.css"/>
    <link rel="stylesheet" href="css/dark.css" id="dark"/>
	<link rel="stylesheet" href="css/light.css" id="light" />

	<!-- Sour Gummy font import -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Vaccine Reminder</title>
  </head>

  <body>
    <header>
		<!-- title and stuff-->
		<h1>Vaccine Reminder</h1>
		<button type="button" onclick="toggleStylesheet(light)">Toggle Theme</button>
	</header>

    <main>
      <form id="userData">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" /><br>

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" /><br>

        <label for="birthDay">Birthday:</label>
        <input type="date" id="birthDay" /><br>

        <h3><b>Risk Factors</b></h3>
        <input type="checkbox" id="Chronic salicylate therapy" name="medical" value = "Chronic salicylate therapy">
        <label for="Chronic salicylate therapy">Chronic salicylate therapy</label><br>
        <input type="checkbox" id="HIV" name="medical" value = "HIV">
        <label for="HIV">HIV</label><br>
        <input type="checkbox" id="Asplenia" name="medical" value = "Asplenia">
        <label for="Asplenia">Asplenia</label><br>
        <input type="checkbox" id="Dialysis/Renal Disease" name="chronic" value = "Dialysis/Renal Disease">
        <label for="Dialysis/Renal Disease">Dialysis/Renal Disease</label><br>
        <input type="checkbox" id="Cystic fibrosis" name="chronic" value = "Cystic fibrosis">
        <label for="Cystic fibrosis">Cystic fibrosis</label><br>
        <input type="checkbox" id="Organ transplant" name="chronic" value = "Organ transplant">
        <label for="Organ transplant">Organ transplant</label><br>
        <input type="checkbox" id="Cancer" name="chronic" value = "Cancer">
        <label for="Cancer">Cancer</label><br>
        <input type="checkbox" id="Hematopoietic stem cell transplant" name="chronic" value = "Hematopoietic stem cell transplant">
        <label for="Hematopoietic stem cell transplant">Hematopoietic stem cell transplant</label><br>
        <input type="checkbox" id="CAR T-cell therapy recipients" name="chronic" value = "CAR T-cell therapy recipients">
        <label for="CAR T-cell therapy recipients">CAR T-cell therapy recipients</label><br>
        <input type="checkbox" id="Under the care of a haematologist or oncologist" name="chronic" value = "Under the care of a haematologist or oncologist">
        <label for="Under the care of a haematologist or oncologist">Under the care of a haematologist or oncologist</label><br>

        <!-- Vaccines -->
        <h3><b>Vaccines</b></h3>
        <input type="checkbox" id="MMRV Dose 1" name="MMRV Dose 1">
        <label for="MMRV Dose 1">MMRV Dose 1</label>
        <input type = "date" id = "dayMMRVDose1" name = "MMRV Dose 1" value = "1967-04-13" min = "1900-01-01" max = "2100-01-01"><br>
        <input type="checkbox" id="MMRV Dose 2" name="MMRV Dose 2">
        <label for="MMRV Dose 2">MMRV Dose 2</label>
        <input type = "date" id = "dayMMRVDose2" name = "MMRV Dose 2" value = "1967-04-13" min = "1900-01-01" max = "2100-01-01"><br>
        <input type="checkbox" id="IPV" name="IPV">
        <label for="IPV">IPV</label>
        <input type = "date" id = "dayIPV" name = "IPV" value = "1967-04-13" min = "1900-01-01" max = "2100-01-01"><br>
        <input type="checkbox" id="Varicella Dose 1" name="Varicella Dose 1">
        <label for="Varicella Dose 1">Varicella Dose 1</label>
        <input type = "date" id = "dayVaricellaDose1" name = "Varicella Dose 1" value = "1967-04-13" min = "1900-01-01" max = "2100-01-01"><br>
        <input type="checkbox" id="Varicella Dose 2" name="Varicella Dose 2">
        <label for="Varicella Dose 2">Varicella Dose 2</label>
        <input type = "date" id = "dayVaricellaDose2" name = "Varicella Dose 2" value = "1967-04-13" min = "1900-01-01" max = "2100-01-01"><br><br>



        <button type="button" id="submitBtn">Submit</button>
      </form>

      <div id="app"></div>

	<script src=js/themeSwitcher.js></script>

	</main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
